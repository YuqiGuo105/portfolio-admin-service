server:
  port: ${PORT:8082}
  servlet:
    context-path: /

spring:
  application:
    name: portfolio-search-indexer

  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 3
      connection-timeout: 30000

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
      spring.json.trusted.packages: "site.yuqi.searchindexer.events,site.yuqi.admin.events,*"
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:search-indexer-group}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.value.default.type: site.yuqi.searchindexer.events.ContentIndexEvent
        spring.json.use.type.headers: false
    listener:
      ack-mode: MANUAL_IMMEDIATE
      concurrency: 2

portfolio:
  opensearch:
    host: ${OPENSEARCH_HOST:os-b4cbaea-yuqi-791c.a.aivencloud.com}
    port: ${OPENSEARCH_PORT:27099}
    username: ${OPENSEARCH_USERNAME:avnadmin}
    password: ${OPENSEARCH_PASSWORD:}
    index:    ${OPENSEARCH_INDEX:portfolio_content_current}
  kafka:
    topics:
      search-index: ${KAFKA_TOPIC_SEARCH_INDEX:content.search.index.v1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    site.yuqi.searchindexer: INFO
    org.apache.kafka: WARN
