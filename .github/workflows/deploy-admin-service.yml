name: Deploy admin-service

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: short SHA)'
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID:        ${{ vars.GCP_PROJECT_ID }}
  REGION:            ${{ vars.GCP_REGION }}
  ARTIFACT_REPO:     ${{ vars.ARTIFACT_REPO }}
  IMAGE_NAME:        portfolio-admin-service
  SERVICE_NAME:      portfolio-admin-service
  WIF_PROVIDER:      ${{ vars.WIF_PROVIDER }}
  DEPLOYER_SA_EMAIL: ${{ vars.DEPLOYER_SA_EMAIL }}
  RUNTIME_SA_EMAIL:  ${{ vars.ADMIN_RUNTIME_SA_EMAIL }}

jobs:
  build-and-deploy:
    name: Build → push → deploy (admin-service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B -DskipTests package -pl admin-service -am

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push Docker image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          docker build -f admin-service/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          # Build JAAS config from individual username/password secrets at deploy time
          KAFKA_BROKERS=$(gcloud secrets versions access latest --secret=KAFKA_BROKERS)
          KAFKA_USER=$(gcloud secrets versions access latest --secret=KAFKA_USERNAME)
          KAFKA_PASS=$(gcloud secrets versions access latest --secret=KAFKA_PASSWORD)
          JAAS="org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${KAFKA_USER}\" password=\"${KAFKA_PASS}\";"

          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --platform=managed \
            --service-account="${RUNTIME_SA_EMAIL}" \
            --allow-unauthenticated \
            --port=8081 \
            --min-instances=0 \
            --max-instances=2 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=60 \
            --set-env-vars="^|^KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BROKERS}|KAFKA_SECURITY_PROTOCOL=SASL_SSL|KAFKA_SASL_MECHANISM=SCRAM-SHA-256|KAFKA_TRUSTSTORE_TYPE=PEM|KAFKA_SASL_JAAS_CONFIG=${JAAS}|KAFKA_TOPIC_SEARCH_INDEX=content.search.index.v1|KAFKA_TOPIC_RAG_INDEX=content.rag.index.v1|KAFKA_TOPIC_NOTIFICATION_ARTICLE=content.notification.article-updates.v1|KAFKA_TOPIC_NOTIFICATION_FEATURE=content.notification.feature-updates.v1|KAFKA_TOPIC_NOTIFICATION_JOBS=content.notification.job-updates.v1|OPENSEARCH_HOST=os-b4cbaea-yuqi-791c.a.aivencloud.com|OPENSEARCH_PORT=27099|OPENSEARCH_USERNAME=avnadmin|ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --update-secrets="SPRING_DATASOURCE_URL=SPRING_DATASOURCE_URL:latest,SPRING_DATASOURCE_USERNAME=SPRING_DATASOURCE_USERNAME:latest,SPRING_DATASOURCE_PASSWORD=SPRING_DATASOURCE_PASSWORD:latest,OPENSEARCH_PASSWORD=OPENSEARCH_PASSWORD:latest,KAFKA_CA_CERT=KAFKA_CA_CERT:latest,SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest,ADMIN_SECRET=ADMIN_SECRET:latest,ADMIN_ALLOWED_EMAILS=ADMIN_ALLOWED_EMAILS:latest"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" --region="${REGION}" --format='value(status.url)')
          echo "Service URL: $URL"
          # Poll Ready condition for up to ~3 minutes (cold start + JPA init can take 20-60s).
          READY=""
          for i in $(seq 1 18); do
            READY=$(gcloud run services describe "${SERVICE_NAME}" --region="${REGION}" \
              --format='value(status.conditions[?(@.type=="Ready")].status)' 2>/dev/null)
            echo "Attempt $i: Ready=${READY:-<empty>}"
            [ "$READY" = "True" ] && break
            [ "$READY" = "False" ] && (echo "Service Ready=False, aborting"; exit 1)
            sleep 10
          done
          [ "$READY" = "True" ] || (echo "Service not ready after polling"; exit 1)
          # Public endpoint: do a best-effort HTTP health check (cold start may take 30s+)
          curl --fail --max-time 60 --retry 3 --retry-delay 10 "$URL/actuator/health" || \
            echo "Warning: HTTP health check did not respond (service is deployed but may still be warming up)"
          echo "Deployment verified: $URL"
