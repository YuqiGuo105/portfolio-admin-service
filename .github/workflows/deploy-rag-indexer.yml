name: Deploy rag-indexer

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag (default: short SHA)'
        required: false
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID:        ${{ vars.GCP_PROJECT_ID }}
  REGION:            ${{ vars.GCP_REGION }}
  ARTIFACT_REPO:     ${{ vars.ARTIFACT_REPO }}
  IMAGE_NAME:        portfolio-rag-indexer
  SERVICE_NAME:      portfolio-rag-indexer
  WIF_PROVIDER:      ${{ vars.WIF_PROVIDER }}
  DEPLOYER_SA_EMAIL: ${{ vars.DEPLOYER_SA_EMAIL }}
  RUNTIME_SA_EMAIL:  ${{ vars.ADMIN_RUNTIME_SA_EMAIL }}

jobs:
  build-and-deploy:
    name: Build → push → deploy (rag-indexer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B -DskipTests package -pl rag-indexer -am

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push Docker image
        env:
          IMAGE: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
        run: |
          docker build -f rag-indexer/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          KAFKA_BROKERS=$(gcloud secrets versions access latest --secret=KAFKA_BROKERS)
          KAFKA_USER=$(gcloud secrets versions access latest --secret=KAFKA_USERNAME)
          KAFKA_PASS=$(gcloud secrets versions access latest --secret=KAFKA_PASSWORD)
          JAAS="org.apache.kafka.common.security.scram.ScramLoginModule required username=\"${KAFKA_USER}\" password=\"${KAFKA_PASS}\";"

          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --platform=managed \
            --service-account="${RUNTIME_SA_EMAIL}" \
            --no-allow-unauthenticated \
            --port=8083 \
            --min-instances=0 \
            --max-instances=2 \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="^|^KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BROKERS}|KAFKA_SECURITY_PROTOCOL=SASL_SSL|KAFKA_SASL_MECHANISM=SCRAM-SHA-256|KAFKA_TRUSTSTORE_TYPE=PEM|KAFKA_SASL_JAAS_CONFIG=${JAAS}|KAFKA_TOPIC_RAG_INDEX=content.rag.index.v1|OPENAI_BASE_URL=https://api.openai.com|OPENAI_EMBEDDING_MODEL=text-embedding-3-small" \
            --update-secrets="SPRING_DATASOURCE_URL=SPRING_DATASOURCE_URL:latest,SPRING_DATASOURCE_USERNAME=SPRING_DATASOURCE_USERNAME:latest,SPRING_DATASOURCE_PASSWORD=SPRING_DATASOURCE_PASSWORD:latest,KAFKA_CA_CERT=KAFKA_CA_CERT:latest,OPENAI_API_KEY=OPENAI_API_KEY:latest"

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe "${SERVICE_NAME}" --region="${REGION}" --format='value(status.url)')
          echo "Service URL: $URL"
          # Verify Cloud Run reports the service as Ready (WIF creds don't support print-identity-token)
          READY=$(gcloud run services describe "${SERVICE_NAME}" --region="${REGION}" \
            --format='value(status.conditions[?(@.type=="Ready")].status)' 2>/dev/null)
          echo "Service Ready status: $READY"
          [ "$READY" = "True" ] || (echo "Service not ready"; exit 1)
          echo "Deployment verified: $URL"
