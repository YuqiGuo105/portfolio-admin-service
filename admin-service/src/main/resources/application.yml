server:
  port: ${PORT:8081}
  servlet:
    context-path: /

spring:
  application:
    name: portfolio-admin-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        # Preserve case-sensitive PascalCase identifiers like "Blogs" / "Projects"
        # from the existing Supabase schema (created by the Next.js portfolio app).
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    table: admin_flyway_schema_history
    # Skip checksum validation against flyway_schema_history. Without this, any
    # cosmetic edit (whitespace, line endings, comments) to an already-applied
    # V*__*.sql blocks startup with FlywayValidateException — which crashed
    # revision portfolio-admin-service-00010 on 2026-06-21 and took the
    # /api/admin/** surface (including dashboard counts and the public blog
    # feed) offline for the entire morning. Schema is owned end-to-end by the
    # V*__*.sql files in this repo, so we don't rely on stored checksums for
    # correctness.
    validate-on-migrate: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      # When using SASL_SSL set KAFKA_SASL_JAAS_CONFIG to:
      #   org.apache.kafka.common.security.scram.ScramLoginModule required username="..." password="...";
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
      ssl.truststore.type: ${KAFKA_TRUSTSTORE_TYPE:PEM}
      ssl.truststore.certificates: ${KAFKA_CA_CERT:}
    producer:
      acks: all
      retries: 2147483647
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
        compression.type: lz4
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

portfolio:
  internal:
    token: ${INTERNAL_API_TOKEN:}
  opensearch:
    host: ${OPENSEARCH_HOST:localhost}
    port: ${OPENSEARCH_PORT:9200}
    username: ${OPENSEARCH_USERNAME:avnadmin}
    password: ${OPENSEARCH_PASSWORD:}
    index: ${OPENSEARCH_INDEX:portfolio_content_current}
    auto-create-index: false
    worker:
      enabled: ${OPENSEARCH_WORKER_ENABLED:false}    # disabled by default; use portfolio-search-indexer service
  admin:
    secret: ${ADMIN_SECRET:}
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  supabase:
    jwt-secret: ${SUPABASE_JWT_SECRET:}
    allowed-emails: ${ADMIN_ALLOWED_EMAILS:}
  kafka:
    topics:
      search-index: ${KAFKA_TOPIC_SEARCH_INDEX:content.search.index.v1}
      rag-index:    ${KAFKA_TOPIC_RAG_INDEX:content.rag.index.v1}
      notification:
        article-updates: ${KAFKA_TOPIC_NOTIFICATION_ARTICLE:content.notification.article-updates.v1}
        feature-updates: ${KAFKA_TOPIC_NOTIFICATION_FEATURE:content.notification.feature-updates.v1}
        job-updates:     ${KAFKA_TOPIC_NOTIFICATION_JOBS:content.notification.job-updates.v1}
  indexers:
    search-url: ${SEARCH_INDEXER_BASE_URL:}
    rag-url: ${RAG_INDEXER_BASE_URL:}
    internal-token: ${INDEXER_INTERNAL_TOKEN:}
  notification:
    base-url: ${NOTIFICATION_SERVICE_BASE_URL:}
    internal-token: ${NOTIFICATION_INTERNAL_TOKEN:}
  gcp:
    metadata-identity-url: ${GCP_METADATA_IDENTITY_URL:http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/identity}
  indexing-relay:
    enabled: ${INDEXING_RELAY_ENABLED:true}
    interval-ms: ${INDEXING_RELAY_INTERVAL_MS:10000}
    initial-delay-ms: ${INDEXING_RELAY_INITIAL_DELAY_MS:15000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: portfolio-admin-service

logging:
  level:
    site.yuqi.admin: INFO
    org.hibernate.SQL: WARN
