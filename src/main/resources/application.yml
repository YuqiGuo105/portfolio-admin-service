server:
  port: ${PORT:8081}
  servlet:
    context-path: /

spring:
  application:
    name: portfolio-admin-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

portfolio:
  admin:
    secret: ${ADMIN_SECRET:}
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  supabase:
    jwt-secret: ${SUPABASE_JWT_SECRET:}
    allowed-emails: ${ADMIN_ALLOWED_EMAILS:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    site.yuqi.admin: INFO
    org.hibernate.SQL: WARN
