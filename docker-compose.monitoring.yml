# Grafana Alloy scraper — runs alongside your services to forward
# Prometheus metrics + logs to Grafana Cloud Free Tier.
#
# Usage (local dev):
#   1. Copy .env.monitoring.example → .env.monitoring and fill in Grafana Cloud credentials
#   2. docker compose -f docker-compose.monitoring.yml --env-file .env.monitoring up -d
#
# Usage (Cloud Run):
#   Deploy as a separate Cloud Run service with the same VPC connector
#   so it can reach other services' internal URLs.

services:
  alloy:
    image: grafana/alloy:latest
    container_name: portfolio-metrics-scraper
    ports:
      - "12345:12345"   # Alloy UI (debugging)
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
    environment:
      # Grafana Cloud credentials
      - GRAFANA_PROMETHEUS_URL=${GRAFANA_PROMETHEUS_URL}
      - GRAFANA_PROMETHEUS_USER=${GRAFANA_PROMETHEUS_USER}
      - GRAFANA_API_KEY=${GRAFANA_API_KEY}
      - GRAFANA_LOKI_URL=${GRAFANA_LOKI_URL}
      - GRAFANA_LOKI_USER=${GRAFANA_LOKI_USER}
      # Service URLs (for local dev, use host.docker.internal or container names)
      - NOTIFICATION_SERVICE_URL=${NOTIFICATION_SERVICE_URL:-host.docker.internal:8080}
      - ADMIN_SERVICE_URL=${ADMIN_SERVICE_URL:-host.docker.internal:8081}
      - SEARCH_INDEXER_URL=${SEARCH_INDEXER_URL:-host.docker.internal:8082}
      - RAG_INDEXER_URL=${RAG_INDEXER_URL:-host.docker.internal:8083}
      - AGENT_SERVICE_URL=${AGENT_SERVICE_URL:-host.docker.internal:8090}
      - MCP_GATEWAY_URL=${MCP_GATEWAY_URL:-host.docker.internal:8091}
      - AGGREGATOR_SERVICE_URL=${AGGREGATOR_SERVICE_URL:-host.docker.internal:8093}
      - ALERTS_SERVICE_URL=${ALERTS_SERVICE_URL:-host.docker.internal:8094}
    command: ["run", "/etc/alloy/config.alloy"]
    restart: unless-stopped
